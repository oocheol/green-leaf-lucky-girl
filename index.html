<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>초록짱짱 럭키걸 🍀</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="game-shell">
      <section class="game-card" aria-label="초록짱짱 럭키걸 게임">
        <div class="hud">
          <div>
            <p class="label">모은 행운</p>
            <strong id="score">0</strong>
          </div>
          <div>
            <p class="label">최고 기록</p>
            <strong id="best">0</strong>
          </div>
          <div class="status-pill" id="luckyStatus">평범한 잎 사냥꾼</div>
        </div>

        <canvas id="game" width="900" height="1400" aria-label="초록잎을 모으는 게임 화면"></canvas>

        <div class="overlay" id="startOverlay">
          <h1>초록짱짱 럭키걸 🍀</h1>
          <p>초록을 모아요! 마구마구 모아요🍀<br>행운이 한가득 모이면 날아다닐 수 있어요🌟<br>가끔 토마토가 되어서 춤도 춰요💃🪩두둠칫<br>모두가 럭키짱짱걸이 되어봐요🍀💓</p>
          <button id="startButton" type="button">시작</button>
        </div>

      </section>
    </main>
    <script src="game.js"></script>
  </body>
</html>
