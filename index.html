<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
    <meta name="google-adsense-account" content="ca-pub-5786432422734713">
    <title>초록짱짱 럭키걸 🍀</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="game-shell">
      <section class="game-card" aria-label="초록짱짱 럭키걸 게임">
        <div class="hud">
          <div>
            <p class="label">모은 행운</p>
            <strong id="score">0</strong>
          </div>
          <div>
            <p class="label">최고 기록</p>
            <strong id="best">0</strong>
          </div>
          <div class="status-pill" id="luckyStatus">평범한 잎 사냥꾼</div>
        </div>

        <div class="action-panel">
          <button id="adButton" type="button">광고보기</button>
          <button id="magnetButton" type="button">자석 0</button>
          <button id="fortuneButton" type="button" disabled>토마토 운세</button>
        </div>

        <canvas id="game" width="900" height="1400" aria-label="초록잎을 모으는 게임 화면"></canvas>

        <div class="fortune-modal hidden" id="fortuneModal" aria-live="polite">
          <div class="fortune-box">
            <p class="label">럭키777 토마토 운세</p>
            <h2 id="fortuneTitle">카드 1장을 골라요</h2>
            <div class="fortune-cards">
              <button type="button" data-card="0">🍅</button>
              <button type="button" data-card="1">🍀</button>
            </div>
            <p id="fortuneText">초록잎 777개를 모은 럭키걸만 볼 수 있어요.</p>
            <button id="fortuneCloseButton" type="button">닫기</button>
          </div>
        </div>

        <div class="overlay" id="startOverlay">
          <h1>초록짱짱 럭키걸 🍀</h1>
          <p>초록을 모아요! 마구마구 모아요🍀<br>행운이 한가득 모이면 날아다닐 수 있어요🌟<br>네잎클로버를 만나면 럭키 기운이 반짝반짝해요✨<br>모두가 럭키짱짱걸이 되어봐요🍀💓</p>
          <button id="startButton" type="button">시작</button>
        </div>

      </section>
    </main>
    <script src="game.js"></script>
  </body>
</html>
